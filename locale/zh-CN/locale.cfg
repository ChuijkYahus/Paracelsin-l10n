[space-location-name]
paracelsin=北冥星

[space-location-description]
paracelsin=北冥星（Paracelsin）：一片冰火山活动极为频繁的冰封荒原。[fluid=nitrogen]自地下海洋流出，在地表形成许多湖泊。星球的地表上还散布着[entity=water-cryovolcano]以及[item=tetrahedrite]和[item=sphalerite]的矿脉，它们对[item=zinc]的提取至关重要。[item=vaterite]也以小矿脉的形式存在。在这个星球上建造的所有东西都必须保持温暖，否则就会结冰；锌提取过程中产生的所有无用副产品都必须进行处理。

