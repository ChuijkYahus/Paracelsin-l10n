[technology-description]
planet-discovery-paracelsin=北冥星（Paracelsin）：一片冰火山活动极为频繁的冰封荒原。[fluid=nitrogen]自地下海洋流出，在地表形成许多湖泊。星球的地表上还散布着[entity=water-cryovolcano]以及[item=tetrahedrite]和[item=sphalerite]的矿脉，它们对[item=zinc]的提取至关重要。[item=vaterite]也以小矿脉的形式存在。在这个星球上建造的所有东西都必须保持温暖，否则就会结冰；锌提取过程中产生的所有无用副产品都必须进行处理。
sphalerite-processing=把[item=sphalerite]加工为[fluid=zinc-concentrate]、[item=iron-ore]和[item=sulfur]。
tetrahedrite-processing=把[item=tetrahedrite]加工为[fluid=zinc-concentrate]、[item=copper-ore]和[item=sulfur]。
zinc-extraction=通过各种工艺处把[fluid=dirty-zinc-solution]加工为[item=zinc]。
electrochemical-plant=利用电化学进行各种化学处理的化工厂。
mechanical-plant=利用先进机械处理制造各种物品的工厂。
galvanization-science-pack=允许研究更进一步的电镀应用技术。
vaterite-processing-productivity=增加[recipe=vaterite-processing]的产出量。
zinc-piping=坚固的隔热管道，由[item=zinc-plate]制成。不会在[planet=paracelsin]、[planet=aquilo]等低温表面冻结，地下管道的长度也较普通管道更长。
axe-mining-speed=通过电镀处理与修复斧镐，可以加快手动采矿的速度。
advanced-repair-device=相较于标准的[item=repair-pack]，这种纳米机器人科技产物的修理速度更快，耐久度也更高。

